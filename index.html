<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="weather-app-base.css" />
    <link rel="stylesheet" href="weather-app-layout.css" />
    <link rel="stylesheet" href="weather-app-aside.css" />
    <link rel="stylesheet" href="weather-app-main.css" />
    <link rel="stylesheet" href="weather-app-buttons.css" />
    <link rel="stylesheet" href="weather-app-mobile.css" />
    <link rel="icon" href="Weather icon with sun, cloud, raindrop.png" />
  </head>
  <body>
    <div id="overlay"></div>
    <aside class="aside">
      <div class="buttons-container">
        <button id="darkmode" data-tooltip="Darkmode Toggle" class="btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
            <path
              d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"
            />
          </svg>
        </button>
        <button id="change-city" data-tooltip="Change City" class="btn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
            <path
              d="M120-120v-560h240v-80l120-120 120 120v240h240v400H120Zm80-80h80v-80h-80v80Zm0-160h80v-80h-80v80Zm0-160h80v-80h-80v80Zm240 320h80v-80h-80v80Zm0-160h80v-80h-80v80Zm0-160h80v-80h-80v80Zm0-160h80v-80h-80v80Zm240 480h80v-80h-80v80Zm0-160h80v-80h-80v80Z"
            />
          </svg>
        </button>
      </div>
    </aside>
    <main class="main">
      <div id="city" class="box"><p class="city-text"></p></div>
      <div id="weather-main" class="box">
        <p class="weather-main-text"></p>
      </div>
      <div id="infos" class="box">
        <div id="description" class="boxes">
          <p>Description:</p>
          <img class="description-img" src="" alt="">
          <p class="description-text"></p>
        </div>
        <div id="humidity" class="boxes">
          <p class="humidity-text"></p>
          
        </div>
        <div id="temp" class="boxes">
          <p class="temp-text"></p>
        </div>
        <div id="wind-speed" class="boxes">
          <p class="wind-speed-text"></p>
        </div>
      </div>
    </main>
    <div class="time">
      <div class="container">
        <h2 class="time-text">10:00 AM</h2>
      </div>
    </div>
    <div class="change-city-box">
      <h1>Change City</h1>
      <div class="dropdown">
        <span class="error-message"></span>
        <input type="text" placeholder="Search city..." id="input" />
        <ul class="list" id="list"></ul>
        <button id="change" class="btn2">Change</button>
        <button id="cancel" class="btn2">Cancel</button>
      </div>
    </div>
    <script type="module" src="weather-app.js" defer></script>
  </body>
</html>
